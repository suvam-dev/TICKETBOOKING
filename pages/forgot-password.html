<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Movie Ticket Booking</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div id="navbar"></div>
    <div class="container">
        <div class="header">
            <h1>Forgot Password</h1>
            <p>Enter your email to reset your password</p>
        </div>
        <form id="forgot-password-form">
            <div style="margin-bottom: 15px;">
                <label for="reset-email">Email:</label><br>
                <input type="email" id="reset-email" name="reset-email" required style="width: 90%; padding: 10px; margin-top: 5px;">
            </div>
            <button type="submit" class="submit">Send Reset Link</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="login.html" style="color: blue;">Back to Login</a>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 MovieTime. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
