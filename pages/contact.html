<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div id="navbar"></div>
    <div class="container" style=" max-width:600px;">
        <h1>Contact Us</h1>
        <p>If you have any questions, feedback, or need assistance, please feel free to reach out to us using the form below. We value your input and will get back to you as soon as possible.</p> 
        <hr>
        <form action="/submit-contact" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required  size="30"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>
    <footer>
        <p>&copy; 2026 MovieTime. All rights reserved.</p>
    </footer>
    <script src="../components/navbar.js" type="module">
        console.log("Contact page script loaded");
    </script>
</body>
</html>
