<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div id="loader-wrapper">
    <video id="loader-video" autoplay muted playsinline>
        <source src="space-loader.mp4" type="video/mp4">
    </video>
</div>
    <main>
        <div id="navbar">           
        </div>
        </div>
        <div class="hero-banner">
                <div class="hero-content">
                    <h1 class="hero-title">Experience the Magic of Cinema</h1>
                    <p class="hero-subtitle">Book tickets for the latest blockbusters from the comfort of your home.</p>
                    <a href="#movies" class="hero-btn">Explore Movies test</a>
                </div>
            </div>

            <div class="movies-container-bg">
                <div class="movies-container" id="movies">
                    <h1 class="text-center">Now Showing</h1>
                    <div class="movies-grid">  </div>
                </div>
                <div class="detailed-view" id="detailed-view" >
                    <div class="detailed-content">
                        <h2 class="detailed-title"></h2>
                        <p class="detailed-desc"></p>
                        <a href="#" class="book-btn">Book Tickets</a>
                    </div>
                </div>
            </div>  
    </main>  
    <footer>    
             <p>&copy; 2026 MovieTime. All rights reserved.</p>
    </footer>
    <script src="/src/script.js" type="module"></script>
    <script>
            document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader-wrapper');
            const video = document.getElementById('loader-video');

            const hideLoader = () => {
                loader.classList.add('loader-hidden');
                loader.addEventListener('transitionend', () => {
                    loader.remove();
                });
            };
            video.addEventListener('ended', hideLoader);
        });
        </script>
</body>

</html>
