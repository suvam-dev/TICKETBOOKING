<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Movie Ticket Booking</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="homepage.html" class="nav-brand">MovieTime</a>
        <div class="nav-links">
            <a href="homepage.html">Home</a>
            <a href="index.html">Book Ticket</a>
            <a href="login.html">Login</a>
        </div>
    </nav>
    <div class="container">
        <div class="header">
            <h1>Reset Password</h1>
            <p>Enter a new password</p>
        </div>
        <form id="reset-password-form">
            <div style="margin-bottom: 15px;">
                <label for="new-password">New Password:</label><br>
                <input type="password" id="new-password" name="new-password" required style="width: 90%; padding: 10px; margin-top: 5px;">
            </div>
            <button type="submit" class="submit">Update Password</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
